          echo ""
          echo "--- Failed Tests ---"
          grep -B1 "<<< FAIL!" backends-velox-spark40-test-output.log || echo "(no failures)"
          echo ""
          echo "--- Error Tests ---"
          grep -B1 "<<< ERROR!" backends-velox-spark40-test-output.log || echo "(no errors)"
      - name: Upload test report
        if: always()
